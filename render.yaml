services:
  - type: web
    name: companyquotations
    env: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WKHTMLTOPDF_PATH
        value: /usr/bin/wkhtmltopdf
      - key: DATABASE_URL
        value: sqlite:////tmp/app.db