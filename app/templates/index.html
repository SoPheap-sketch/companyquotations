<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projects — Quotation System</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Projects</h1>
      <p class="muted">Create a project to attach quotes to.</p>
    </header>

    <main>
      <section class="card">
        <h2>Create Project</h2>
        <form method="post" action="/projects/create">
          <div style="margin-bottom:8px;">
            <label>Client name:<br><input name="client_name" required style="width:100%;padding:8px;"></label>
          </div>
          <div style="margin-bottom:8px;">
            <label>Site:<br><input name="site" style="width:100%;padding:8px;"></label>
          </div>
          <div style="margin-bottom:8px;">
            <label>Contact:<br><input name="contact" style="width:100%;padding:8px;"></label>
          </div>
          <button type="submit" style="padding:8px 14px;">Create Project</button>
        </form>
      </section>

      <section class="card small">
        <h3>Quick links</h3>
        <p><a href="/">← Back to Dashboard</a></p>
        <p>To see created projects as JSON: <a href="/projects">/projects</a></p>
      </section>
    </main>

    <footer>
      <small>Company Quotation System — MVP skeleton</small>
    </footer>
  </div>
</body>
</html>
