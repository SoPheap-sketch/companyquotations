<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Estimate #{{ quote.id }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type='number']::-webkit-inner-spin-button,
    input[type='number']::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    .input-standard{ padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:.875rem; transition:.15s; }
    .input-standard:focus{ border-color:#0ea5e9; outline:none; box-shadow:0 0 0 3px rgba(14,165,233,.2); }
    .label-mini{ font-size:.65rem; font-weight:800; color:#64748b; text-transform:uppercase; margin-bottom:4px; display:block; }
    .card-header-blue{ border-top:6px solid #0284c7; }
  </style>
</head>

<body
  class="bg-slate-50 min-h-screen"
  data-quote-id="{{ quote.id }}"
  data-project-id="{{ project_id }}"
  data-items='{{ items_json | safe }}'
  data-margin="{{ quote.profit_margin or 0.3 }}"
>

<header class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/projects/{{ project_id }}" class="text-slate-500 hover:text-sky-600 font-medium">← Back to Project</a>
    {% if quote.status != "approved" %}
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
        Save
      </button>
    {% else %}
      <button disabled class="bg-gray-300 text-gray-500 px-4 py-2 rounded cursor-not-allowed">
        Approved (Locked)
      </button>
    {% endif %}
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-8">
  <h1 class="text-3xl font-black text-slate-900 mb-2">Edit Estimate #{{ quote.id }}</h1>
  <p class="text-slate-500 mb-6">Client: <span class="font-bold text-slate-700">{{ project_client_name }}</span></p>

  <div class="mb-3 max-w-xl">
    <label class="label-mini">Estimate Title</label>
    <input id="quoteTitle" class="input-standard w-full" value="{{ quote.title or '' }}">
  </div>

  <div class="bg-white rounded-xl shadow-xl p-6 card-header-blue mb-8">
    <div class="flex justify-between mb-4">
      <h2 class="text-lg font-bold">🚀 Item Entry / Edit</h2>
      <button onclick="toggleDetails()" class="text-xs font-bold text-sky-600">+ Show Detail Fields</button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
      <div class="md:col-span-2"><label class="label-mini">Category (区分)</label><input id="fCat" class="input-standard w-full"></div>
      <div class="md:col-span-2"><label class="label-mini">Work Type (工種)</label><input id="fType" class="input-standard w-full"></div>
      <div class="md:col-span-2"><label class="label-mini">Item Name (要素)</label><input id="fName" class="input-standard w-full"></div>
      <div class="md:col-span-1"><label class="label-mini">Qty</label><input id="fQty" type="number" value="1" class="input-standard w-full text-center"></div>
      <div class="md:col-span-1"><label class="label-mini">Unit</label><input id="fUnit" class="input-standard w-full text-center" placeholder="式"></div>
      <div class="md:col-span-2"><label class="label-mini">Unit Price</label><input id="fPrice" type="number" class="input-standard w-full text-right font-bold text-rose-600"></div>
      <div class="md:col-span-2"><button id="addBtn" class="w-full bg-emerald-600 text-white font-black py-2.5 rounded-lg">ADD</button></div>
    </div>

    <div id="detailDrawer" class="hidden mt-6 grid grid-cols-1 md:grid-cols-12 gap-4">
      <div class="md:col-span-3"><label class="label-mini">Supplier</label><input id="fSup" class="input-standard w-full"></div>
      <div class="md:col-span-3"><label class="label-mini">Specification</label><input id="fSpec" class="input-standard w-full"></div>
      <div class="md:col-span-2"><label class="label-mini">Date</label><input id="fDate" type="date" class="input-standard w-full"></div>
      <div class="md:col-span-4"><label class="label-mini">Remark</label><input id="fRem" class="input-standard w-full"></div>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-xl overflow-hidden card-header-blue">
    <table class="w-full">
      <thead class="bg-slate-800 text-white text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Category</th>
          <th class="px-4 py-3 text-left">Work Type</th>
          <th class="px-4 py-3 text-left">Element</th>
          <th class="px-4 py-3 text-center">Qty</th>
          <th class="px-4 py-3 text-center">Unit</th>
          <th class="px-4 py-3 text-right">Unit Price</th>
          <th class="px-4 py-3 text-right">Total</th>
          <th class="px-4 py-3 text-center">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="p-6 bg-slate-50 text-right">
      <div class="text-slate-600">Subtotal: <span id="dispSub">¥0</span></div>
      <div class="text-slate-600">Margin (%): <input id="globalMargin" type="number" class="w-14 text-center border rounded"></div>
      <div class="text-xl font-black mt-2 text-slate-900">TOTAL: <span id="dispTotal">¥0</span></div>
    </div>
  </div>
</main>

<script>
const QUOTE_ID = Number(document.body.dataset.quoteId);
const PROJECT_ID = Number(document.body.dataset.projectId);
const INITIAL_ITEMS = JSON.parse(document.body.dataset.items || "[]");
const INITIAL_MARGIN = Number(document.body.dataset.margin || 0.3);

const tableBody = document.getElementById('tableBody');
const marginInput = document.getElementById('globalMargin');
marginInput.value = Math.round(INITIAL_MARGIN * 100);

const fmt = v => Math.round(v).toLocaleString('ja-JP', { style: 'currency', currency: 'JPY' });

function toggleDetails() { document.getElementById('detailDrawer').classList.toggle('hidden'); }

function calculate() {
  let sub = 0;
  tableBody.querySelectorAll('tr').forEach(r => { sub += Number(r.dataset.total || 0); });
  const marginPercent = Number(marginInput.value) / 100;
  document.getElementById('dispSub').innerText = fmt(sub);
  document.getElementById('dispTotal').innerText = fmt(sub * (1 + marginPercent));
}

window.editItem = (btn) => {
  const row = btn.closest('tr');
  document.getElementById('fCat').value = row.dataset.category;
  document.getElementById('fType').value = row.dataset.workType; // Added
  document.getElementById('fName').value = row.dataset.name;
  document.getElementById('fSup').value = row.dataset.supplier;
  document.getElementById('fQty').value = row.dataset.qty;
  document.getElementById('fUnit').value = row.dataset.unit;
  document.getElementById('fPrice').value = row.dataset.unitPrice;
  document.getElementById('fSpec').value = row.dataset.spec;
  document.getElementById('fDate').value = row.dataset.date;
  document.getElementById('fRem').value = row.dataset.remark;
  
  row.remove();
  calculate();
  document.getElementById('fName').focus();
};

function renderItemRow(item) {
  const qty = Number(item.quantity || 0);
  const price = Number(item.unit_price || 0);
  const total = qty * price;
  const tr = document.createElement('tr');
  tr.className = "border-b hover:bg-slate-50 transition-colors";
  
  Object.assign(tr.dataset, {
    category: item.work_category || '',
    workType: item.work_type || '', // Added
    name: item.element || '',
    supplier: item.supplier || '',
    date: item.date || '',
    spec: item.spec || '',
    qty: qty,
    unit: item.unit || '',
    unitPrice: price,
    remark: item.remark || '',
    total: total
  });

  tr.innerHTML = `
    <td class="px-4 py-3 text-sm">${item.work_category || ''}</td>
    <td class="px-4 py-3 text-sm">${item.work_type || ''}</td>
    <td class="px-4 py-3 text-sm font-medium">${item.element || ''}</td>
    <td class="px-4 py-3 text-center text-sm">${qty}</td>
    <td class="px-4 py-3 text-center text-sm">${item.unit || ''}</td>
    <td class="px-4 py-3 text-right text-sm">${fmt(price)}</td>
    <td class="px-4 py-3 text-right text-sm font-bold">${fmt(total)}</td>
    <td class="px-4 py-3 text-center space-x-2">
      <button class="text-sky-500 hover:text-sky-700 font-bold" onclick="editItem(this)">✎</button>
      <button class="text-rose-500 hover:text-rose-700 font-bold" onclick="this.closest('tr').remove();calculate()">✕</button>
    </td>
  `;
  tableBody.appendChild(tr);
}

INITIAL_ITEMS.forEach(item => renderItemRow(item));
calculate();

document.getElementById('addBtn').onclick = () => {
  const item = {
    element: document.getElementById('fName').value.trim(),
    work_category: document.getElementById('fCat').value,
    work_type: document.getElementById('fType').value, // Added
    supplier: document.getElementById('fSup').value,
    quantity: Number(document.getElementById('fQty').value || 1),
    unit: document.getElementById('fUnit').value || '式',
    unit_price: Number(document.getElementById('fPrice').value || 0),
    spec: document.getElementById('fSpec').value,
    date: document.getElementById('fDate').value,
    remark: document.getElementById('fRem').value
  };
  if (!item.element || item.unit_price <= 0) return alert("Enter Name and Price");
  renderItemRow(item);
  calculate();
  ['fName', 'fPrice', 'fType'].forEach(id => document.getElementById(id).value = '');
};

document.getElementById('saveBtn').onclick = async () => {
  const title = document.getElementById('quoteTitle').value.trim();
  if (!title) return alert("Enter Estimate Title");
  
  const items = Array.from(tableBody.querySelectorAll('tr')).map(r => ({
    work_category: r.dataset.category,
    work_type: r.dataset.workType, // Added
    element: r.dataset.name,
    supplier: r.dataset.supplier,
    date: r.dataset.date,
    spec: r.dataset.spec,
    quantity: Number(r.dataset.qty),
    unit: r.dataset.unit,
    unit_price: Number(r.dataset.unitPrice),
    remark: r.dataset.remark
  }));

  try {
    const res = await fetch(`/quotes/${QUOTE_ID}/items/save`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, items, profit_margin: Number(marginInput.value) / 100 })
    });
    if (res.ok) window.location.href = `/projects/${PROJECT_ID}`;
    else alert("Failed to save changes.");
  } catch (err) { alert("Server connection error."); }
};

marginInput.oninput = calculate;
</script>
</body>
</html>
