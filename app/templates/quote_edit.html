<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% if quote %}Edit Quote #{{ quote.id }}{% else %}New Quote Builder{% endif %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {500:'#0ea5e9',600:'#0284c7',700:'#0369a1'},
            success: {500:'#10b981',600:'#059669'},
            danger: {500:'#f43f5e',600:'#e11d48'}
          }
        }
      }
    }
  </script>

  <style>
    input[type='number']::-webkit-inner-spin-button,
    input[type='number']::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    .input-standard{
      padding:10px;border-radius:8px;border:1px solid #cbd5e1;
      font-size:.875rem;transition:.15s;
    }
    .input-standard:focus{
      border-color:#0ea5e9;outline:none;
      box-shadow:0 0 0 3px rgba(14,165,233,.2);
    }
    .label-mini{
      font-size:.65rem;font-weight:800;color:#64748b;
      text-transform:uppercase;margin-bottom:4px;display:block;
    }
    .card-header-blue{border-top:6px solid #0284c7;}
  </style>
</head>

<body
  class="bg-slate-50 min-h-screen"
  data-quote-id="{{ quote.id if quote else 0 }}"
  data-project-id="{{ project_id }}"
  >

<header class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/projects/{{ project_id }}"
       class="text-slate-500 hover:text-primary-600 font-medium">← Back</a>
    <button id="saveBtn"
      class="bg-primary-600 text-white px-8 py-2.5 rounded-lg font-bold shadow-lg hover:bg-primary-700">
      Save Quote
    </button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-8">
  

  <h1 class="text-3xl font-black text-slate-900 mb-2">
    {% if quote %}Edit Estimate #{{ quote.id }}{% else %}Project Estimation Console{% endif %}
  </h1>
  <p class="text-slate-500 mb-6">
    Client: {{ project_client_name or 'N/A' }}
  </p>
  <div class="mb-3 max-w-xl">
  <label class="label-mini">Estimate Title</label>
  <input
    id="quoteTitle"
    class="input-standard w-full"
    placeholder="e.g. Exterior work estimate"
    value="{{ quote.title if quote and quote.title else '' }}"
  >
</div>

  <div class="bg-white rounded-xl shadow-xl p-6 card-header-blue mb-8">
    <div class="flex justify-between mb-4">
      <h2 class="text-lg font-bold">🚀 Fast Item Entry</h2>
      <button onclick="toggleDetails()" class="text-xs font-bold text-primary-600">
        + Show Detail Fields
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
      <div class="md:col-span-3">
        <label class="label-mini">Item Name</label>
        <input id="fName" class="input-standard w-full">
      </div>
      <div class="md:col-span-2">
        <label class="label-mini">Category</label>
        <input id="fCat" class="input-standard w-full">
      </div>
      <div class="md:col-span-2">
        <label class="label-mini">Supplier</label>
        <input id="fSup" class="input-standard w-full">
      </div>
      <div class="md:col-span-1">
        <label class="label-mini">Qty</label>
        <input id="fQty" type="number" value="1" class="input-standard w-full text-center">
      </div>
      <div class="md:col-span-1">
        <label class="label-mini">Unit</label>
        <input id="fUnit" class="input-standard w-full text-center" placeholder="式">
      </div>
      <div class="md:col-span-2">
        <label class="label-mini">Unit Price</label>
        <input id="fPrice" type="number"
               class="input-standard w-full text-right font-bold text-rose-600">
      </div>
      <div class="md:col-span-1">
        <button id="addBtn"
          class="w-full bg-success-600 text-white font-black py-2.5 rounded-lg">
          ADD
        </button>
      </div>
    </div>

    <div id="detailDrawer" class="hidden mt-6 grid grid-cols-1 md:grid-cols-12 gap-4">
      <div class="md:col-span-4">
        <label class="label-mini">Specification</label>
        <input id="fSpec" class="input-standard w-full">
      </div>
      <div class="md:col-span-3">
        <label class="label-mini">Date</label>
        <input id="fDate" type="date" class="input-standard w-full">
      </div>
      <div class="md:col-span-5">
        <label class="label-mini">Remark</label>
        <input id="fRem" class="input-standard w-full">
      </div>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-xl overflow-hidden card-header-blue">
    <table class="w-full">
      <thead class="bg-slate-800 text-white text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Category / Date</th>
          <th class="px-4 py-3 text-left">Work</th>
          <th class="px-4 py-3 text-left">Supplier</th>
          <th class="px-4 py-3 text-center">Qty</th>
          <th class="px-4 py-3 text-center">Unit</th>
          <th class="px-4 py-3 text-right">Unit Price</th>
          <th class="px-4 py-3 text-right">Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
   
  

      </tbody>
    </table>

    <div class="p-6 bg-slate-50 text-right">
      <div class="text-slate-600">Subtotal: <span id="dispSub">¥0</span></div>
      <div class="text-slate-600">Margin (%):
        <input id="globalMargin" value="30" type="number" class="w-14 text-center border rounded">
      </div>
      <div class="text-xl font-black mt-2 text-slate-900">
        TOTAL: <span id="dispTotal">¥0</span>
      </div>
    </div>
  </div>
</main>


<script>
// --------------------
// Global constants
// --------------------
const QUOTE_ID = Number(document.body.dataset.quoteId);
const EXISTING_ITEMS = JSON.parse(document.body.dataset.items || "[]");
const PROJECT_ID = Number(document.body.dataset.projectId);


// DOM References
const tableBody = document.getElementById('tableBody');
const addBtn = document.getElementById('addBtn');
const saveBtn = document.getElementById('saveBtn');
const marginInput = document.getElementById('globalMargin');

// Form Field References
const fName = document.getElementById('fName');
const fCat = document.getElementById('fCat');
const fSup = document.getElementById('fSup');
const fQty = document.getElementById('fQty');
const fUnit = document.getElementById('fUnit');
const fPrice = document.getElementById('fPrice');
const fSpec = document.getElementById('fSpec');
const fDate = document.getElementById('fDate');
const fRem = document.getElementById('fRem');

// Currency Formatter
const fmt = v =>
  Math.round(v).toLocaleString('ja-JP', {
    style: 'currency',
    currency: 'JPY'
  });

// --------------------
// UI helpers
// --------------------
function toggleDetails() {
  document.getElementById('detailDrawer').classList.toggle('hidden');
}

function calculate() {
  let sub = 0;
  tableBody.querySelectorAll('tr').forEach(r => {
    sub += Number(r.dataset.total || 0);
  });

  const marginPercent = Number(marginInput.value) / 100;
  const marginAmount = sub * marginPercent;

  document.getElementById('dispSub').innerText = fmt(sub);
  document.getElementById('dispTotal').innerText = fmt(sub + marginAmount);
}
function renderItemRow(item) {
  const qty = Number(item.quantity || 0);
  const price = Number(item.unit_price || 0);
  const total = qty * price;

  const tr = document.createElement('tr');
  tr.className = "border-b hover:bg-slate-50 transition-colors";

  tr.dataset.category = item.work_category || '';
  tr.dataset.name = item.element || '';
  tr.dataset.supplier = item.supplier || '';
  tr.dataset.date = item.date || '';
  tr.dataset.spec = item.spec || '';
  tr.dataset.qty = qty;
  tr.dataset.unit = item.unit || '';
  tr.dataset.unitPrice = price;
  tr.dataset.remark = item.remark || '';
  tr.dataset.total = total;

  tr.innerHTML = `
    <td class="px-4 py-3 text-sm">${item.work_category || ''}<br>
      <small class="text-slate-400">${item.date || ''}</small>
    </td>
    <td class="px-4 py-3 text-sm font-medium">${item.element || ''}<br>
      <small class="text-slate-400">${item.spec || ''}</small>
    </td>
    <td class="px-4 py-3 text-sm">${item.supplier || ''}</td>
    <td class="px-4 py-3 text-center text-sm">${qty}</td>
    <td class="px-4 py-3 text-center text-sm">${item.unit || ''}</td>
    <td class="px-4 py-3 text-right text-sm">${fmt(price)}</td>
    <td class="px-4 py-3 text-right text-sm font-bold">${fmt(total)}</td>
    <td class="px-4 py-3 text-center">
      <button
        class="text-rose-500 hover:text-rose-700 font-bold"
        onclick="this.closest('tr').remove();calculate()"
      >✕</button>
    </td>
  `;

  tableBody.appendChild(tr);
}

// --------------------
// Add item
// --------------------
addBtn.onclick = () => {
  const name = fName.value.trim();
  const qty = Number(fQty.value || 1);
  const price = Number(fPrice.value || 0);
  const unit = fUnit.value || '式';

  if (!name || price <= 0) {
    alert("Please enter Name and Price.");
    return;
  }

  const total = qty * price;
  const tr = document.createElement('tr');
  tr.className = "border-b hover:bg-slate-50 transition-colors";

  tr.dataset.category = fCat.value;
  tr.dataset.name = name;
  tr.dataset.supplier = fSup.value;
  tr.dataset.date = fDate.value;
  tr.dataset.spec = fSpec.value;
  tr.dataset.qty = qty;
  tr.dataset.unit = unit;
  tr.dataset.unitPrice = price;
  tr.dataset.remark = fRem.value;
  tr.dataset.total = total;

  tr.innerHTML = `
    <td class="px-4 py-3 text-sm">${fCat.value}<br><small class="text-slate-400">${fDate.value}</small></td>
    <td class="px-4 py-3 text-sm font-medium">${name}<br><small class="text-slate-400">${fSpec.value}</small></td>
    <td class="px-4 py-3 text-sm">${fSup.value}</td>
    <td class="px-4 py-3 text-center text-sm">${qty}</td>
    <td class="px-4 py-3 text-center text-sm">${unit}</td>
    <td class="px-4 py-3 text-right text-sm">${fmt(price)}</td>
    <td class="px-4 py-3 text-right text-sm font-bold">${fmt(total)}</td>
    <td class="px-4 py-3 text-center">
      <button
        class="text-rose-500 hover:text-rose-700 font-bold"
        onclick="this.closest('tr').remove();calculate()"
      >✕</button>
    </td>
  `;

  tableBody.appendChild(tr);
  calculate();

  fName.value = '';
  fPrice.value = '';
};
// --------------------
// Save quote
// --------------------
saveBtn.onclick = async () => {

  const title = document.getElementById('quoteTitle').value.trim();

  // ❌ Validation
  if (!title) {
    alert("❌ Please enter Estimate Title");
    document.getElementById('quoteTitle').focus();
    return;
  }

  if (tableBody.children.length === 0) {
    alert("❌ Please add at least one item");
    return;
  }

  const items = [];

  tableBody.querySelectorAll('tr').forEach(r => {
    items.push({
      work_category: r.dataset.category,
      element: r.dataset.name,
      supplier: r.dataset.supplier,
      date: r.dataset.date,
      spec: r.dataset.spec,
      quantity: Number(r.dataset.qty),
      unit: r.dataset.unit,
      unit_price: Number(r.dataset.unitPrice),
      remark: r.dataset.remark
    });
  });

  try {
    const res = await fetch(`/quotes/${QUOTE_ID}/items/save`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: title,
        items: items,
        profit_margin: Number(marginInput.value) / 100
      })
    });

    if (res.ok) {
      // ✅ AUTO REDIRECT (no alert, no OK)
      window.location.href = `/projects/${PROJECT_ID}/quotes`;
    } else {
      alert("❌ Failed to save quote");
    }
  } catch (err) {
    console.error(err);
    alert("❌ Server connection error");
  }
};

marginInput.oninput = calculate;
if (EXISTING_ITEMS.length > 0) {
  EXISTING_ITEMS.forEach(item => renderItemRow(item));
  calculate();
}
</script>

</body>
</html>
