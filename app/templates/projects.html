<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Project</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': {
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-slate-100 font-sans">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white shadow-sm border-b border-primary-100">
      <div class="max-w-4xl mx-auto px-6 py-4">
        <a href="/projects/list" class="text-md text-slate-600 hover:text-primary-600 transition duration-150 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Projects List
        </a>
      </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto px-6 py-10 w-full">
      <div class="bg-white rounded-xl shadow-lg p-8 border-t-4 border-primary-600">
        <h1 class="text-3xl font-bold text-slate-900">Create New Project</h1>
        <p class="text-md text-slate-600 mt-2">Enter the required details to begin a new client project.</p>

        <form method="post" action="/projects/create" class="mt-8 space-y-6">
          
          <div>
            <label for="client_name" class="block text-sm font-semibold text-slate-700 mb-1">Client Name <span class="text-red-500">*</span></label>
            <input 
              name="client_name" 
              id="client_name" 
              required 
              class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:ring-primary-500 focus:border-primary-500 p-3 transition duration-150" 
              placeholder="e.g. MK Construction & Design Co."
            >
          </div>

          <div>
            <label for="site" class="block text-sm font-semibold text-slate-700 mb-1">Site Location</label>
            <input 
              name="site" 
              id="site"
              class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:ring-primary-500 focus:border-primary-500 p-3 transition duration-150" 
              placeholder="e.g. 123 Main St, City, Country"
            >
          </div>

          <div>
            <label for="contact" class="block text-sm font-semibold text-slate-700 mb-1">Primary Contact (Phone or Email)</label>
            <input 
              name="contact" 
              id="contact"
              class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:ring-primary-500 focus:border-primary-500 p-3 transition duration-150" 
              placeholder="e.g. john.doe@client.com or +855 12 345 678"
            >
          </div>

          <div class="pt-4 flex items-center gap-4">
            <button 
              type="submit" 
              class="inline-flex items-center gap-2 bg-primary-600 text-white font-semibold px-6 py-3 rounded-lg shadow-md hover:bg-primary-700 transition duration-150"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
              </svg>
              Create Project
            </button>
            
            <a href="/projects/list" class="text-md text-slate-600 hover:text-primary-600 hover:underline">Cancel</a>
          </div>
        </form>
      </div>
    </main>

    <footer class="bg-white border-t mt-10">
      <div class="max-w-4xl mx-auto px-6 py-4 text-sm text-slate-500">
        Design & Build Quoter — MVP
      </div>
    </footer>
  </div>
</body>
</html>
